services:
  backend:
    build: ./backend
    container_name: etf-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - backend-venv:/app/.venv
      - etf-db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/etf_momentum.db
    networks:
      - etf-net

  frontend:
    build: ./frontend
    container_name: etf-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - frontend-node-modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - etf-net

volumes:
  etf-db:
    name: etf-momentum-db
  backend-venv:
    name: etf-momentum-backend-venv
  frontend-node-modules:
    name: etf-momentum-frontend-node-modules

networks:
  etf-net:
    name: etf-momentum-net
