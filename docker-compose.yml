version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - etf-data:/app/data
    environment:
      - ETF_DATA_SOURCE=akshare
      - DATABASE_URL=sqlite:///./data/etf.db
    networks:
      - etf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - etf-net
    restart: unless-stopped

volumes:
  etf-data:

networks:
  etf-net:
    driver: bridge